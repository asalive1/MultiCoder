name: Linux Build + Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build git pkg-config \
            libportaudio2 portaudio19-dev \
            libmp3lame-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            libxml2-dev

            # Ubuntu 24.04 runners may not provide this package in default repos.
            # Keep CI green when unavailable; code paths requiring it are optional.
            if apt-cache show libfdk-aac-dev >/dev/null 2>&1; then
              sudo apt-get install -y --no-install-recommends libfdk-aac-dev
            else
              echo "libfdk-aac-dev not available on this runner image; continuing without it"
            fi

      - name: Configure
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -GNinja

      - name: Build
        run: cmake --build build --parallel

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure --no-tests=ignore -R "LivewireMapping|HLS"

      - name: Check test artifact directory
        id: test_artifacts
        if: always()
        run: |
          if [ -d build/Testing ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload test results
        if: always() && steps.test_artifacts.outputs.found == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: test-results-linux
          path: build/Testing/
          if-no-files-found: ignore
