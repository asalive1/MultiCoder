name: Windows Build (best-effort)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat

      - name: Install dependencies via vcpkg
        run: |
          C:\vcpkg\vcpkg install libxml2:x64-windows openssl:x64-windows curl:x64-windows pthreads:x64-windows

      - name: Configure
        run: |
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build --config Release

      - name: Run unit tests (LivewireMapping only — no audio hardware)
        run: ctest --test-dir build --build-config Release --output-on-failure -R LivewireMapping

      - name: Package
        run: |
          mkdir dist
          copy build\Release\multicoder-supervisor.exe dist\
          copy build\Release\multicoder-worker.exe dist\
          xcopy www dist\www /E /I
          xcopy configs dist\configs /E /I
          copy scripts\windows-install.ps1 dist\
          copy README.md dist\

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: multicoder-windows-x64
          path: dist\
